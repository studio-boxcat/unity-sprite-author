[package]
name = "unity-sprite-author"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "unity_sprite_author"
crate-type = ["cdylib", "rlib"]

# Runtime deps held to serde for the .tps.fab.json manifest (see docs/fab.md).
# Everything else is hand-rolled: custom YAML emitter, custom hex, std-only
# entropy. Criterion is dev-only; it does not appear in the cdylib.
[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

[[bench]]
name = "pipeline"
harness = false

[profile.release]
panic = "unwind"
lto = "thin"
codegen-units = 1
strip = false

# Bench profile: optimized like release but with debug info so flamegraphs
# resolve symbols. Run e.g.:
#   cargo bench
#   cargo flamegraph --bench pipeline -- --bench
[profile.bench]
debug = true
