[package]
name = "unity-sprite-author"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "unity_sprite_author"
crate-type = ["cdylib", "rlib"]

# Deliberately zero runtime deps. Custom YAML, custom hex, std-only entropy.
# Criterion is dev-only; it does not appear in the cdylib.
[dependencies]

[dev-dependencies]
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

[[bench]]
name = "pipeline"
harness = false

[profile.release]
panic = "unwind"
lto = "thin"
codegen-units = 1
strip = false

# Bench profile: optimized like release but with debug info so flamegraphs
# resolve symbols. Run e.g.:
#   cargo bench
#   cargo flamegraph --bench pipeline -- --bench
[profile.bench]
debug = true
